name: CI

# Runs cargo test, svelte-check, vitest, and production build on every push and PR to main.
# Platform installer builds live in release.yml (tag-driven).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      # Tauri v2 on Linux needs the WebKitGTK + GTK + AppIndicator stack;
      # ubuntu-latest images don't ship those by default.
      - name: Install Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libxdo-dev \
            libssl-dev \
            build-essential

      - name: cargo test
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: npm ci (root)
        run: npm ci

      - name: svelte-check
        run: npm run check

      - name: vitest
        run: npm test

      - name: production build
        run: npm run build