name: Release

# Builds platform installers + updater artifacts on tag push, then publishes
# them to this repo (AbstractNucleus/templater) under a tag matching the source-repo tag.
#
# Required secrets:
#   TAURI_SIGNING_PRIVATE_KEY           — minisign private key (base64-encoded
#                                         contents of the .key file)
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  — password for that key
#
# Tags must match the version in src-tauri/tauri.conf.json (e.g. tag v0.1.2
# requires version "0.1.2"). The publish job refuses to run on a mismatch.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x86_64
          - os: macos-14
            target: aarch64-apple-darwin
            label: macos-aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.target }}

      - run: npm ci

      - name: Build app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.label }}
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe.sig
            src-tauri/target/release/bundle/macos/*.app.tar.gz
            src-tauri/target/release/bundle/macos/*.app.tar.gz.sig
            src-tauri/target/release/bundle/dmg/*.dmg

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate tag matches tauri.conf.json
        if: github.event_name == 'push'
        run: |
          CONF_VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          TAG="${GITHUB_REF_NAME}"
          if [ "v${CONF_VERSION}" != "${TAG}" ]; then
            echo "::error::Tag ${TAG} does not match tauri.conf.json version v${CONF_VERSION}"
            exit 1
          fi

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate latest.json
        run: node scripts/make-release-manifest.mjs --input-dir artifacts

      - name: Publish to this repo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          TAG="v${VERSION}"
          REPO="${{ github.repository }}"
          FILES=()
          for f in artifacts/nsis/*.exe artifacts/nsis/*.exe.sig \
                   artifacts/macos/*.app.tar.gz artifacts/macos/*.app.tar.gz.sig \
                   artifacts/dmg/*.dmg \
                   artifacts/latest.json; do
            [ -e "$f" ] && FILES+=("$f")
          done
          echo "Publishing ${#FILES[@]} files to ${REPO} ${TAG}"
          printf '  %s\n' "${FILES[@]}"
          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            echo "Release $TAG already exists; uploading files with --clobber"
            gh release upload "$TAG" --repo "$REPO" --clobber "${FILES[@]}"
          else
            gh release create "$TAG" \
              --repo "$REPO" \
              --title "$TAG" \
              --generate-notes \
              "${FILES[@]}"
          fi